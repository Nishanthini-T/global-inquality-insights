<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - GIIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy-dark: #0f172a;
            --navy: #1e293b;
            --navy-light: #334155;
            --purple: #7c3aed;
            --purple-light: #8b5cf6;
            --teal: #06b6d4;
            --teal-light: #22d3ee;
            --orange: #f97316;
            --orange-light: #fb923c;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-600: #475569;
            --gray-700: #334155;
            --gradient-primary: linear-gradient(135deg, #1e293b 0%, #7c3aed 100%);
            --gradient-hero: linear-gradient(135deg, #0f172a 0%, #4c1d95 50%, #7c3aed 100%);
            --gradient-teal: linear-gradient(135deg, #06b6d4 0%, #22d3ee 100%);
            --gradient-orange: linear-gradient(135deg, #f97316 0%, #fb923c 100%);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--gray-50);
            color: var(--gray-700);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            background: var(--gradient-primary);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-lg);
            padding: 1rem 0;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            color: var(--teal-light);
        }

        .back-btn {
            background: transparent;
            border: 2px solid var(--teal-light);
            color: var(--teal-light);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .back-btn:hover {
            background: var(--teal);
            color: var(--white);
        }

        /* Main Content */
        .main-content {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .profile-card {
            background: var(--white);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: var(--shadow-2xl);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: var(--gradient-teal);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 2.5rem;
            color: var(--white);
            margin: 0 auto 1.5rem;
            border: 4px solid var(--teal-light);
            box-shadow: 0 10px 30px rgba(6, 182, 212, 0.3);
        }

        .profile-header h1 {
            font-size: 2rem;
            color: var(--navy-dark);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .profile-header p {
            color: var(--gray-600);
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--navy-dark);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-600);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .form-group textarea {
            padding: 1rem;
            resize: vertical;
            min-height: 120px;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--gradient-teal);
            color: var(--white);
            box-shadow: var(--shadow-lg);
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-xl);
        }

        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-700);
            width: 100%;
            margin-top: 1rem;
        }

        .btn-secondary:hover {
            background: var(--gray-200);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #34d399;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #f87171;
        }

        @media (max-width: 640px) {
            .profile-card {
                padding: 2rem 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-card {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="dashboard.html" class="logo">
                <i class="fas fa-globe-americas"></i>
                GIIP
            </a>
            <a href="dashboard.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                Back to Dashboard
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar">U</div>
                <h1 id="profileName">User Profile</h1>
                <p>Manage your account information</p>
            </div>

            <div id="profileAlert" class="alert"></div>

            <form onsubmit="handleSaveProfile(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="fullName" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="you@example.com" required>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="phone" placeholder="+1 234 567 8900">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Organization</label>
                        <div class="input-wrapper">
                            <i class="fas fa-building"></i>
                            <input type="text" id="organization" placeholder="Your Organization">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Role/Position</label>
                    <div class="input-wrapper">
                        <i class="fas fa-briefcase"></i>
                        <select id="role">
                            <option value="">Select your role</option>
                            <option value="researcher">Researcher</option>
                            <option value="policymaker">Policymaker</option>
                            <option value="analyst">Data Analyst</option>
                            <option value="student">Student</option>
                            <option value="academic">Academic</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Bio/About</label>
                    <textarea id="bio" placeholder="Tell us about yourself..."></textarea>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i>
                        Save Changes
                    </button>
                    <a href="dashboard.html" class="btn btn-secondary">
                        <i class="fas fa-times"></i>
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Check if user is logged in
        window.onload = function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = 'index.html';
                return;
            }

            // Load user data
            loadUserData();
        };

        // Load user data from localStorage
        function loadUserData() {
            const userName = localStorage.getItem('userName') || '';
            const userEmail = localStorage.getItem('userEmail') || '';
            const userPhone = localStorage.getItem('userPhone') || '';
            const userOrganization = localStorage.getItem('userOrganization') || '';
            const userRole = localStorage.getItem('userRole') || '';
            const userBio = localStorage.getItem('userBio') || '';

            // Fill form fields
            document.getElementById('fullName').value = userName;
            document.getElementById('email').value = userEmail;
            document.getElementById('phone').value = userPhone;
            document.getElementById('organization').value = userOrganization;
            document.getElementById('role').value = userRole;
            document.getElementById('bio').value = userBio;

            // Update profile header
            document.getElementById('profileName').textContent = userName || 'User Profile';

            // Generate and display initials
            const nameParts = userName.trim().split(' ');
            let initials = 'U';
            if (nameParts.length >= 2) {
                initials = (nameParts[0][0] + nameParts[nameParts.length - 1][0]).toUpperCase();
            } else if (nameParts.length === 1 && nameParts[0].length > 0) {
                initials = nameParts[0][0].toUpperCase();
            }
            document.getElementById('profileAvatar').textContent = initials;
        }

        // Handle Save Profile
        function handleSaveProfile(event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const organization = document.getElementById('organization').value;
            const role = document.getElementById('role').value;
            const bio = document.getElementById('bio').value;

            // Save to localStorage
            localStorage.setItem('userName', fullName);
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userPhone', phone);
            localStorage.setItem('userOrganization', organization);
            localStorage.setItem('userRole', role);
            localStorage.setItem('userBio', bio);

            // Show success message
            showAlert('Profile updated successfully!', 'success');

            // Update profile header
            document.getElementById('profileName').textContent = fullName;

            // Update initials
            const nameParts = fullName.trim().split(' ');
            let initials = 'U';
            if (nameParts.length >= 2) {
                initials = (nameParts[0][0] + nameParts[nameParts.length - 1][0]).toUpperCase();
            } else if (nameParts.length === 1 && nameParts[0].length > 0) {
                initials = nameParts[0][0].toUpperCase();
            }
            document.getElementById('profileAvatar').textContent = initials;

            // Redirect to dashboard after 2 seconds
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        }

        // Show alert message
        function showAlert(message, type) {
            const alert = document.getElementById('profileAlert');
            alert.textContent = message;
            alert.className = 'alert alert-' + type;
            alert.style.display = 'block';

            setTimeout(() => {
                alert.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
